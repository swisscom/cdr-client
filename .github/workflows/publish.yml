name: Publish release

on:
  push:
    branches:
      - develop
  pull_request:
    types: [closed]
    branches:
      - develop
  release:
    types: [created]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build and publish with Gradle Wrapper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew clean build publishVersion

  # Release builds - needs write access to upload artifacts to GitHub release
  release-artifacts:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write   # Required to upload artifacts to GitHub releases
      packages: write   # Required to publish to GitHub Packages

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build and publish with Gradle Wrapper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew clean build publishVersion

      # Detect which components have changed since last release
      - name: Detect changed components
        id: detect-changes
        run: |
          echo "Detecting changes since last release..."
          
          # Get the previous release tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            echo "No previous release found, building all components"
            echo "watchdog_changed=true" >> $GITHUB_OUTPUT
            echo "updateservice_changed=true" >> $GITHUB_OUTPUT
            echo "service_changed=true" >> $GITHUB_OUTPUT
          else
            echo "Previous release: $PREV_TAG"
            
            # Check if watchdog files changed
            if git diff --name-only $PREV_TAG HEAD | grep -q "^cdr-client-watchdog/"; then
              echo "Watchdog files changed"
              echo "watchdog_changed=true" >> $GITHUB_OUTPUT
            else
              echo "No watchdog changes"
              echo "watchdog_changed=false" >> $GITHUB_OUTPUT
            fi
            
            # Check if updateservice files changed
            if git diff --name-only $PREV_TAG HEAD | grep -q "^cdr-client-updateservice/"; then
              echo "UpdateService files changed"
              echo "updateservice_changed=true" >> $GITHUB_OUTPUT
            else
              echo "No updateservice changes"
              echo "updateservice_changed=false" >> $GITHUB_OUTPUT
            fi
            
            # Check if service files changed (service JAR always included)
            if git diff --name-only $PREV_TAG HEAD | grep -q "^cdr-client-service/\|^cdr-client-common/"; then
              echo "Service files changed"
              echo "service_changed=true" >> $GITHUB_OUTPUT
            else
              echo "No service changes"
              echo "service_changed=true" >> $GITHUB_OUTPUT  # Always build service for releases
            fi
          fi

      - name: Build Windows Server release artifacts
        run: |
          echo "Building release artifacts for Windows Server..."
          
          # Get version from gradle
          VERSION=$(./gradlew -q properties | grep "^version:" | awk '{print $2}')
          echo "Version: $VERSION"
          
          mkdir -p release-artifacts
          
          # Service JAR was already built by 'build' task above, just copy it
          echo "Building service JAR..."
          cp cdr-client-service/build/libs/cdr-client-service-*.jar release-artifacts/cdr-client-service-${VERSION}.jar
          
          # Build watchdog (framework-dependent for release) - only if changed
          if [ "${{ steps.detect-changes.outputs.watchdog_changed }}" = "true" ]; then
            echo "Building watchdog (changes detected)..."
            ./gradlew buildWatchdogRelease
            cd cdr-client-watchdog/publish-release
            zip -r ../../release-artifacts/CdrClientWatchdog-${VERSION}.zip ./*
            cd ../..
          else
            echo "Skipping watchdog build (no changes)"
          fi
          
          # Build update service - only if changed
          if [ "${{ steps.detect-changes.outputs.updateservice_changed }}" = "true" ]; then
            echo "Building update service (changes detected)..."
            ./gradlew buildUpdateService
            cd cdr-client-updateservice/publish
            zip -r ../../release-artifacts/curaLINEClient-updateservice-${VERSION}.zip ./*
            cd ../..
          else
            echo "Skipping update service build (no changes)"
          fi
          
          echo "Release artifacts created:"
          ls -lh release-artifacts/

      - name: Upload service JAR
        uses: softprops/action-gh-release@v3
        with:
          files: release-artifacts/cdr-client-service-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload watchdog artifact
        if: steps.detect-changes.outputs.watchdog_changed == 'true'
        uses: softprops/action-gh-release@v3
        with:
          files: release-artifacts/CdrClientWatchdog-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload update service artifact
        if: steps.detect-changes.outputs.updateservice_changed == 'true'
        uses: softprops/action-gh-release@v3
        with:
          files: release-artifacts/curaLINEClient-updateservice-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
